<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Simple Loan App</title>
  <style>
    body { font-family: system-ui, Arial; padding: 1rem; max-width: 720px; margin: auto; }
    label { display:block; margin-top: .5rem; }
    input { padding:.4rem; width:100%; box-sizing:border-box }
    button { margin-top: .6rem; padding:.6rem 1rem; }
    li { margin: .4rem 0; }
  </style>
</head>
<body>
  <h1>Loan App (Demo)</h1>

  <form id="loanForm">
    <label>
      Name
      <input name="name" required />
    </label>
    <label>
      Amount
      <input name="amount" type="number" required />
    </label>
    <label>
      Term (optional)
      <input name="term" />
    </label>
    <button type="submit">Create Loan</button>
  </form>

  <h2>Loans</h2>
  <ul id="loansList"></ul>

  <script>
    async function fetchLoans() {
      const res = await fetch('/api/loans');
      const data = await res.json();
      const list = document.getElementById('loansList');
      list.innerHTML = '';
      if (!data || data.length === 0) {
        list.innerHTML = '<li>No loans yet.</li>';
        return;
      }
      data.forEach(item => {
        const li = document.createElement('li');
        li.textContent = `${item.name} — ₱${item.amount} ${item.term ? ' / ' + item.term : ''} (${new Date(item.createdAt).toLocaleString()})`;
        list.appendChild(li);
      });
    }

    document.getElementById('loanForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const f = e.target;
      const payload = {
        name: f.name.value,
        amount: Number(f.amount.value),
        term: f.term.value || null
      };
      await fetch('/api/loans', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      f.reset();
      fetchLoans();
    });

    // load on open
    fetchLoans();
  </script>
</body>
</html>
